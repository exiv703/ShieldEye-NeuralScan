# Pytest configuration for ShieldEye NeuralScan
# Why: without a local config, pytest walks up to the parent Shield-Eye-Core
# project and uses ITS pytest.ini as rootdir/configfile, which breaks if this
# repo is checked out standalone or the parent layout changes.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --tb=short
    --strict-markers
